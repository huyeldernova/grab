spring:
  application:
    name: API

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

jwt:
  secret-key: ${JWT_SECRET:dev-only-change-me-in-production-this-is-not-a-real-secret-key-for-grab-clone-project-2026}

logging:
  level:
    org.flywaydb: INFO
    org.hibernate.SQL: DEBUG