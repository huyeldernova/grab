services:
  postgres:
    image: postgres:15-alpine
    container_name: grab_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: grab_clone
      POSTGRES_USER: grab_user
      POSTGRES_PASSWORD: grab_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grab_user -d grab_clone"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: grab_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata: