name: CI
run-name: ${{ github.actor }} is ci out GitHub Actions 🚀
on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Build Maven
        working-directory: API
        run: mvn clean package -DskipTests

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./API
          file: ./API/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/grab-backend:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "Start deploying EC2 ..."
            cd /home/ubuntu
            sudo bash -c 'sed -i "s/IMAGE_TAG=.*/IMAGE_TAG=${{ github.sha }}/" /home/ubuntu/.env'
            sudo docker compose pull app
            sudo docker compose up -d app
            sudo docker image prune -f
            echo "Deploying EC2 complete."







